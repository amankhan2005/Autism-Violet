 <!DOCTYPE html>
<html lang="en">
<head>

  <!-- ================= BASIC META ================= -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ================= SEO TITLE ================= -->
  <title>
    Autism Violet | ABA Therapy & Autism Support Services
  </title>

  <!-- ================= SEO DESCRIPTION ================= -->
  <meta
    name="description"
    content="Autism Violet provides compassionate ABA therapy, autism support, and personalized care for children. Empowering families with expert guidance and evidence-based treatment."
  />

  <!-- ================= FONTS ================= -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- ================= FAVICON ================= -->
  <!-- replace with your logo file -->
  <link rel="icon" type="image/png" href="/logo.png" />

  <!-- Theme color = your purple -->
  <meta name="theme-color" content="#6B3FA0" />

  <!-- ================= OPEN GRAPH ================= -->
  <meta property="og:title" content="Autism Violet" />
  <meta
    property="og:description"
    content="Personalized ABA therapy and autism care designed to help children grow, learn, and thrive."
  />
  <meta property="og:image" content="/logo.png" />
  <meta property="og:url" content="https://autismviolet.com" />
  <meta property="og:type" content="website" />

  <!-- ================= TWITTER CARD ================= -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Autism Violet" />
  <meta
    name="twitter:description"
    content="Supporting children with autism through personalized therapy and compassionate care."
  />
  <meta name="twitter:image" content="/logo.png" />

  <!-- ================= SEO KEYWORDS ================= -->
  <meta
    name="keywords"
    content="autism therapy, ABA therapy, autism support, child therapy, behavioral therapy, autism services, special needs care, autism treatment"
  />

  <!-- ================= CANONICAL ================= -->
  <link rel="canonical" href="https://autismviolet.com/" />

  <!-- ================= ROBOTS ================= -->
  <meta name="robots" content="index, follow" />

  <!-- ================= STRUCTURED DATA (SEO BOOST 🔥) ================= -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "MedicalBusiness",
    "name": "Autism Violet",
    "url": "https://autismviolet.com/",
    "logo": "https://autismviolet.com/logo.png",
    "description": "Autism Violet provides ABA therapy and personalized autism care for children and families.",
    "telephone": "+1-508-373-4511",
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Massachusetts",
      "addressCountry": "US"
    },
    "contactPoint": {
      "@type": "ContactPoint",
      "contactType": "Customer Support",
      "telephone": "+1-508-373-4511",
      "areaServed": "US"
    },
    "sameAs": [
      "https://www.facebook.com/",
      "https://www.instagram.com/"
    ]
  }
  </script>

  <!-- ================= VITE + REACT ================= -->
  <script type="module" src="/src/main.jsx"></script>

</head>

<body class="font-[Poppins] bg-white text-gray-800">

  <div id="root"></div>

</body>
</html>
